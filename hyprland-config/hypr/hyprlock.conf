background {
    monitor = eDP-1
    path = /home/user/Downloads/berserker2.png   # only png supported for now
    color = rgba(25, 20, 20, 1.0)
    blur = true

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_passes = 0 # 0 disables blurring
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.2
    vibrancy_darkness = 0.5
}

input-field {
    monitor = eDP-1
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = false
    dots_rounding = -1 # -1 default circle, -2 follow input-field rounding
    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = true
    fade_timeout = 1000 # Milliseconds before fade_on_empty is triggered.
    placeholder_text = <i>Input Password...</i> # Text rendered in the input box when it's empty.
    hide_input = false
    rounding = -1 # -1 means complete rounding (circle/oval)
    check_color = rgb(255, 221, 0)
    fail_color = rgb(255, 0, 0) # if authentication failed, changes outer_color and fail message color
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # can be set to empty
    fail_transition = 300 # transition time in ms between normal outer_color and fail_color
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
    invert_numlock = false # change color if numlock is off
    swap_font_color = false # see below

    position = 0, -20
    halign = center
    valign = center
    outline_thickness = 2
    outline_color = rgba(255, 255, 255, 0.2)
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = rgba(255, 255, 255, 1.0)

}
label {
    text = cmd[update:1000] echo $(date '+%H:%M:%S')
    font_family = JetBrainsMono Nerd Font
    font_size = 48
    position = 0, 200
    halign = center
    valign = center
}
label {
    monitor = eDP-1               # заміни на свій монітор (див. `hyprctl monitors`)
    text = Locked 🔒              # будь-який текст
    font_family = JetBrainsMono  # або твій шрифт
    font_size = 24
    position = 0, 50           # X, Y — -100 пікселів над центром
    halign = center
    valign = center
    color = rgba(ffffffee)
}

